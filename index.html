<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diferenciagro · Guia de Cobrança</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#081911;
    --bg-1:#0e2818;
    --bg-2:#153a24;
    --bg-3:#1c4a2e;
    --line: rgba(255,255,255,0.09);
    --line-strong: rgba(255,255,255,0.16);
    --green: #5fbf46;
    --green-light: #9be07f;
    --green-dim: #2f6b2c;
    --gold: #e0a83e;
    --red: #e0574a;
    --text-0: #f5f8f3;
    --text-1: #c7d6c9;
    --text-2: #8ca391;
    --radius: 18px;
    --shadow: 0 20px 50px -20px rgba(0,0,0,0.6);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(circle at 20% -10%, #12331f 0%, var(--bg-0) 45%) fixed, var(--bg-0);
    color: var(--text-0);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height:100vh;
  }
  h1,h2,h3,h4, .display{ font-family:'Sora', sans-serif; }

  /* subtle background texture: leaf veins */
  .veins{
    position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.35;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.05) 1px, transparent 1px),
      radial-gradient(1px 1px at 80% 60%, rgba(255,255,255,0.04) 1px, transparent 1px),
      radial-gradient(1px 1px at 40% 85%, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 400px 400px;
  }

  .wrap{ position:relative; z-index:1; max-width: 1080px; margin:0 auto; padding: 0 20px 80px; }

  /* HEADER */
  header.top{
    display:flex; align-items:center; justify-content:space-between;
    padding: 22px 0 18px; gap:16px; flex-wrap:wrap;
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .logo-mark{ width:44px; height:44px; flex:none; }
  .brand-name{ font-weight:800; letter-spacing:0.5px; font-size:1.15rem; }
  .brand-name .accent{ color: var(--green-light); }
  .brand-sub{ font-size:0.72rem; color:var(--text-2); letter-spacing:1.5px; text-transform:uppercase; margin-top:1px;}

  .progress-pill{
    font-size:0.78rem; color:var(--text-1); background:var(--bg-2);
    border:1px solid var(--line); padding:8px 14px; border-radius:100px;
    display:flex; align-items:center; gap:8px;
  }
  .progress-pill b{ color: var(--green-light); }

  /* HERO */
  .hero{
    background: linear-gradient(160deg, var(--bg-2) 0%, var(--bg-1) 60%, var(--bg-0) 100%);
    border:1px solid var(--line);
    border-radius: 24px;
    padding: 40px 32px;
    margin: 10px 0 28px;
    position:relative;
    overflow:hidden;
    box-shadow: var(--shadow);
  }
  .hero::after{
    content:"";
    position:absolute; right:-60px; top:-60px; width:280px; height:280px;
    background: radial-gradient(circle, rgba(95,191,70,0.18), transparent 70%);
  }
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-size:0.72rem; letter-spacing:1.6px; text-transform:uppercase;
    color: var(--green-light); font-weight:700; margin-bottom:14px;
  }
  .eyebrow::before{ content:"●"; color:var(--green); font-size:0.6rem; }
  .hero h1{ font-size: clamp(1.6rem, 4vw, 2.35rem); line-height:1.15; margin:0 0 12px; max-width: 640px;}
  .hero p.lead{ color:var(--text-1); max-width:560px; font-size:1rem; line-height:1.6; margin:0 0 22px;}

  .pillars{ display:flex; gap:28px; flex-wrap:wrap; margin-top: 8px;}
  .pillar{ display:flex; align-items:center; gap:10px; }
  .pillar .ic{
    width:38px; height:38px; border-radius:50%; border:1.5px solid var(--green-dim);
    display:flex; align-items:center; justify-content:center; color:var(--green-light); font-size:1rem;
    background: rgba(95,191,70,0.08);
  }
  .pillar span{ font-size:0.82rem; font-weight:600; color:var(--text-1); letter-spacing:0.3px;}

  .golden-rule{
    margin-top: 26px; background: rgba(224,168,62,0.08); border:1px solid rgba(224,168,62,0.35);
    border-radius: 14px; padding:16px 18px; display:flex; gap:12px; align-items:flex-start;
  }
  .golden-rule .ic{ font-size:1.2rem; flex:none; margin-top:1px;}
  .golden-rule p{ margin:0; font-size:0.9rem; color:var(--text-0); line-height:1.55;}
  .golden-rule b{ color: var(--gold); }

  /* TABS */
  nav.tabs{
    position: sticky; top:0; z-index:20;
    display:flex; gap:6px; overflow-x:auto;
    background: rgba(8,25,17,0.88); backdrop-filter: blur(10px);
    border:1px solid var(--line); border-radius: 14px;
    padding:6px; margin-bottom: 26px;
    scrollbar-width:none;
  }
  nav.tabs::-webkit-scrollbar{ display:none; }
  .tab-btn{
    flex:none; appearance:none; border:none; cursor:pointer;
    background:transparent; color:var(--text-2);
    font-family:'Inter',sans-serif; font-weight:600; font-size:0.84rem;
    padding:10px 16px; border-radius:10px; transition: all .18s ease;
    white-space:nowrap;
  }
  .tab-btn:hover{ color:var(--text-0); }
  .tab-btn.active{ background: var(--green); color:#07240f; }

  section.panel{ display:none; animation: fadeIn .35s ease; }
  section.panel.active{ display:block; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

  .panel-head{ margin-bottom: 20px; }
  .panel-head h2{ font-size:1.3rem; margin:0 0 6px; }
  .panel-head p{ color:var(--text-2); font-size:0.9rem; margin:0; max-width:620px; line-height:1.5;}

  /* STEP TIMELINE (etapas) */
  .timeline{ display:flex; flex-direction:column; gap:0; }
  .step-card{
    display:flex; gap:16px; cursor:pointer; position:relative; padding: 4px 0 26px 0;
    background:none; border:none; text-align:left; width:100%; color:inherit; font-family:inherit;
  }
  .step-card:last-child{ padding-bottom:4px; }
  .step-rail{ display:flex; flex-direction:column; align-items:center; flex:none; }
  .step-num{
    width:40px; height:40px; border-radius:50%; background:var(--bg-2);
    border:1.5px solid var(--green-dim); display:flex; align-items:center; justify-content:center;
    font-weight:800; color:var(--green-light); font-size:1rem; flex:none;
    transition: all .2s ease;
  }
  .step-card:hover .step-num{ background:var(--green); color:#07240f; border-color:var(--green); }
  .step-line{ width:2px; flex:1; background: linear-gradient(var(--green-dim), var(--line)); margin:4px 0; min-height:14px;}
  .step-card:last-child .step-line{ display:none; }
  .step-body{
    flex:1; background:var(--bg-1); border:1px solid var(--line); border-radius:16px;
    padding:16px 18px; transition: all .18s ease;
  }
  .step-card:hover .step-body{ border-color:var(--green-dim); background:var(--bg-2); transform: translateX(2px); }
  .step-title{ font-weight:700; font-size:0.98rem; margin:0 0 4px; display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .step-title .arrow{ color:var(--text-2); font-size:1rem; transition: transform .18s ease;}
  .step-card:hover .arrow{ transform: translateX(3px); color:var(--green-light); }
  .step-desc{ margin:0; color:var(--text-1); font-size:0.85rem; line-height:1.5; }

  /* GRID CARDS (situações) */
  .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); gap:14px; }
  .grid-card{
    background:var(--bg-1); border:1px solid var(--line); border-radius:16px;
    padding:18px; cursor:pointer; text-align:left; color:inherit; font-family:inherit;
    display:flex; flex-direction:column; gap:10px; transition: all .18s ease;
  }
  .grid-card:hover{ border-color:var(--green-dim); background:var(--bg-2); transform: translateY(-2px); box-shadow: var(--shadow);}
  .grid-card .ic{
    width:38px; height:38px; border-radius:10px; background: rgba(95,191,70,0.1);
    border:1px solid var(--green-dim); display:flex; align-items:center; justify-content:center; font-size:1.05rem;
  }
  .grid-card h4{ margin:0; font-size:0.94rem; line-height:1.35; }
  .grid-card p.hint{ margin:0; color:var(--text-2); font-size:0.78rem; line-height:1.4;}
  .grid-card .tag{
    align-self:flex-start; font-size:0.68rem; font-weight:700; letter-spacing:0.4px; text-transform:uppercase;
    padding:3px 9px; border-radius:100px; margin-top:auto;
  }
  .tag.common{ background:rgba(95,191,70,0.12); color:var(--green-light); }
  .tag.extra{ background:rgba(224,168,62,0.12); color:var(--gold); }
  .tag.risk{ background:rgba(224,87,74,0.12); color:#f18d83; }

  /* Quando ligar - timeline horizontal cards */
  .moments{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; }
  .moment-card{
    background:var(--bg-1); border:1px solid var(--line); border-radius:16px; padding:18px;
    cursor:pointer; color:inherit; text-align:left; font-family:inherit; transition:all .18s ease;
    position:relative; overflow:hidden;
  }
  .moment-card:hover{ border-color:var(--green-dim); background:var(--bg-2); transform:translateY(-2px);}
  .moment-badge{ font-size:0.7rem; font-weight:800; letter-spacing:0.6px; text-transform:uppercase; color:var(--green-light); margin-bottom:8px; display:block;}
  .moment-card h4{ margin:0 0 6px; font-size:1.02rem; }
  .moment-card p{ margin:0; color:var(--text-2); font-size:0.8rem; line-height:1.45;}

  /* Nunca faça */
  .never-list{ display:flex; flex-direction:column; gap:10px; }
  .never-item{
    display:flex; align-items:flex-start; gap:14px; background:var(--bg-1);
    border:1px solid var(--line); border-left:3px solid var(--red); border-radius:12px;
    padding:14px 16px; cursor:pointer; text-align:left; color:inherit; font-family:inherit; width:100%;
    transition: all .18s ease;
  }
  .never-item:hover{ background:var(--bg-2); }
  .never-item .x{ color:var(--red); font-size:1.1rem; flex:none; margin-top:1px;}
  .never-item p{ margin:0; font-size:0.88rem; color:var(--text-0); line-height:1.5;}
  .never-item .arrow{ margin-left:auto; color:var(--text-2); flex:none;}

  /* Checklist */
  .checklist-wrap{ background:var(--bg-1); border:1px solid var(--line); border-radius:18px; padding:22px; }
  .cl-progress-track{ height:8px; background:var(--bg-3); border-radius:100px; overflow:hidden; margin-bottom:20px;}
  .cl-progress-fill{ height:100%; width:0%; background: linear-gradient(90deg, var(--green-dim), var(--green)); transition: width .3s ease; }
  .cl-item{ display:flex; align-items:flex-start; gap:12px; padding:10px 4px; border-bottom:1px solid var(--line); cursor:pointer; user-select:none;}
  .cl-item:last-child{ border-bottom:none; }
  .cl-box{
    width:22px; height:22px; border-radius:6px; border:1.5px solid var(--line-strong); flex:none;
    display:flex; align-items:center; justify-content:center; margin-top:1px; transition: all .15s ease;
  }
  .cl-item.checked .cl-box{ background:var(--green); border-color:var(--green); }
  .cl-box svg{ opacity:0; transition:opacity .15s ease; width:13px; height:13px;}
  .cl-item.checked .cl-box svg{ opacity:1; }
  .cl-text{ font-size:0.88rem; line-height:1.5; color:var(--text-1); transition: color .15s ease;}
  .cl-item.checked .cl-text{ color:var(--text-2); text-decoration: line-through; text-decoration-color: var(--green-dim); }
  .cl-done-msg{
    margin-top:18px; padding:14px 16px; border-radius:12px; background: rgba(95,191,70,0.1);
    border:1px solid var(--green-dim); font-size:0.86rem; line-height:1.55; display:none;
  }
  .cl-done-msg.show{ display:block; }
  .cl-done-msg b{ color:var(--green-light); }

  /* MODAL */
  .overlay{
    position:fixed; inset:0; background: rgba(4,12,7,0.72); backdrop-filter: blur(4px);
    display:flex; align-items:center; justify-content:center; padding:20px; z-index:100;
    opacity:0; pointer-events:none; transition: opacity .22s ease;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .modal{
    width:100%; max-width: 480px; background: var(--bg-1);
    border:1px solid var(--line-strong); border-radius:22px; overflow:hidden;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.8);
    transform: translateY(16px) scale(0.98); transition: transform .25s ease;
    max-height: 88vh; display:flex; flex-direction:column;
  }
  .overlay.show .modal{ transform: translateY(0) scale(1); }
  .modal-head{
    background: linear-gradient(135deg, var(--bg-3), var(--bg-2));
    padding:16px 18px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--line);
    flex:none;
  }
  .modal-head .logo-mark{ width:32px; height:32px; }
  .modal-head .who{ flex:1; min-width:0; }
  .modal-head .who .name{ font-weight:700; font-size:0.86rem; display:flex; align-items:center; gap:5px; }
  .modal-head .who .role{ font-size:0.7rem; color:var(--text-2); }
  .modal-close{
    appearance:none; border:none; background: rgba(255,255,255,0.06); color:var(--text-1);
    width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:1rem; flex:none;
    display:flex; align-items:center; justify-content:center; transition: background .15s ease;
  }
  .modal-close:hover{ background: rgba(255,255,255,0.14); color:var(--text-0); }
  .modal-body{ padding:20px 20px 22px; overflow-y:auto; }
  .modal-eyebrow{ font-size:0.7rem; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:var(--green-light); margin-bottom:10px;}
  .modal-title{ font-size:1.08rem; margin:0 0 16px; line-height:1.35; }

  .speech-box{
    background: rgba(95,191,70,0.08); border:1px solid rgba(95,191,70,0.3);
    border-radius:14px; padding:14px 16px; margin-bottom:14px;
  }
  .speech-box .lbl{ font-size:0.7rem; font-weight:800; letter-spacing:0.6px; text-transform:uppercase; color:var(--green-light); display:flex; align-items:center; gap:6px; margin-bottom:8px;}
  .speech-box p{ margin:0; font-size:0.95rem; line-height:1.6; font-style:italic; color:var(--text-0); }

  .tip-box{
    background: rgba(224,168,62,0.08); border:1px solid rgba(224,168,62,0.3);
    border-radius:14px; padding:14px 16px; margin-bottom:14px;
  }
  .tip-box .lbl{ font-size:0.7rem; font-weight:800; letter-spacing:0.6px; text-transform:uppercase; color:var(--gold); display:flex; align-items:center; gap:6px; margin-bottom:8px;}
  .tip-box p{ margin:0; font-size:0.86rem; line-height:1.55; color:var(--text-1); }

  .warn-box{
    background: rgba(224,87,74,0.08); border:1px solid rgba(224,87,74,0.3);
    border-radius:14px; padding:14px 16px; margin-bottom:14px;
  }
  .warn-box .lbl{ font-size:0.7rem; font-weight:800; letter-spacing:0.6px; text-transform:uppercase; color:#f18d83; display:flex; align-items:center; gap:6px; margin-bottom:8px;}
  .warn-box p{ margin:0; font-size:0.86rem; line-height:1.55; color:var(--text-1); }

  .modal-nav{ display:flex; justify-content:space-between; gap:10px; margin-top:16px; }
  .modal-nav button{
    flex:1; appearance:none; cursor:pointer; border:1px solid var(--line); background:var(--bg-2);
    color:var(--text-1); font-family:'Inter',sans-serif; font-weight:600; font-size:0.8rem;
    padding:10px 12px; border-radius:10px; transition:all .15s ease;
  }
  .modal-nav button:hover:not(:disabled){ background:var(--bg-3); color:var(--text-0); }
  .modal-nav button:disabled{ opacity:0.35; cursor:not-allowed; }

  footer{ text-align:center; color:var(--text-2); font-size:0.76rem; padding-top:30px; line-height:1.6; }
  footer .logo-mark{ width:22px; height:22px; vertical-align:middle; margin-right:6px;}
  .reset-link{
    background:none; border:none; color:var(--text-2); font-size:0.72rem; cursor:pointer;
    text-decoration:underline; font-family:'Inter',sans-serif; margin-top:10px; padding:4px;
  }
  .reset-link:hover{ color:var(--text-1); }

  /* EDIÇÃO INLINE ("O que dizer") */
  .lbl-row{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; }
  .lbl-row .lbl{ margin-bottom:0; }
  .edit-btn{
    appearance:none; border:1px solid var(--green-dim); background:rgba(95,191,70,0.1);
    color:var(--green-light); font-family:'Inter',sans-serif; font-weight:700; font-size:0.68rem;
    letter-spacing:0.3px; padding:5px 10px; border-radius:100px; cursor:pointer; flex:none;
    transition: all .15s ease; white-space:nowrap;
  }
  .edit-btn:hover{ background:var(--green); color:#07240f; }
  .edited-flag{
    font-size:0.62rem; font-weight:700; color:var(--gold); background:rgba(224,168,62,0.12);
    border-radius:100px; padding:2px 8px; margin-left:6px; text-transform:uppercase; letter-spacing:0.3px;
  }
  .edit-area{
    width:100%; min-height:88px; resize:vertical; background:var(--bg-0); color:var(--text-0);
    border:1.5px solid var(--green-dim); border-radius:10px; padding:10px 12px;
    font-family:'Inter',sans-serif; font-size:0.92rem; line-height:1.55; margin-bottom:10px;
  }
  .edit-area:focus{ outline:none; border-color:var(--green); }
  .edit-actions{ display:flex; gap:8px; margin-bottom:2px; }
  .edit-save, .edit-cancel{
    appearance:none; border:none; cursor:pointer; font-family:'Inter',sans-serif; font-weight:700;
    font-size:0.8rem; padding:9px 14px; border-radius:10px; transition: all .15s ease;
  }
  .edit-save{ background:var(--green); color:#07240f; }
  .edit-save:hover{ background:var(--green-light); }
  .edit-cancel{ background:var(--bg-2); color:var(--text-1); border:1px solid var(--line); }
  .edit-cancel:hover{ background:var(--bg-3); color:var(--text-0); }

  .progress-pill{ appearance:none; font-family:'Inter',sans-serif; cursor:pointer; }
  .progress-pill:hover{ border-color:var(--green-dim); background:var(--bg-3); }

  /* CHECKLIST FLUTUANTE — fica ACIMA do modal (overlay z-index:100) de propósito,
     para dar pra marcar o checklist mesmo com uma etapa/situação aberta */
  .checklist-fab{
    position:fixed; z-index:150; bottom:22px; right:20px;
    width:56px; height:56px; border-radius:50%; border:none; cursor:pointer;
    background: linear-gradient(160deg, var(--green), var(--green-dim));
    color:#07240f; font-size:1.4rem; display:flex; align-items:center; justify-content:center;
    box-shadow: 0 12px 30px -8px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.1);
    transition: transform .18s ease, bottom .2s ease;
  }
  .checklist-fab:hover{ transform:scale(1.07); }
  .checklist-fab .fab-badge{
    position:absolute; top:-4px; right:-4px; background:var(--gold); color:#241a05;
    font-size:0.6rem; font-weight:800; padding:2px 6px; border-radius:100px; border:2px solid var(--bg-0);
  }
  /* Com um modal (etapa/situação) aberto, sobe um pouco para não tampar os botões de navegação do modal */
  body.modal-open .checklist-fab{ bottom:100px; }
  body.modal-open .checklist-drawer{ bottom:168px; }

  .checklist-drawer{
    position:fixed; z-index:149; bottom:90px; right:20px;
    width: min(340px, calc(100vw - 40px));
    max-height:56vh; overflow-y:auto;
    background: var(--bg-1); border:1px solid var(--line-strong); border-radius:18px;
    box-shadow: 0 30px 70px -20px rgba(0,0,0,0.8);
    transform: translateY(12px) scale(0.97); opacity:0; pointer-events:none;
    transition: opacity .2s ease, transform .2s ease, bottom .2s ease;
  }
  .checklist-drawer.open{ transform:none; opacity:1; pointer-events:auto; }
  .drawer-head{
    display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
    padding:16px 16px 12px; border-bottom:1px solid var(--line);
    background: linear-gradient(135deg, var(--bg-3), var(--bg-2));
    border-radius:18px 18px 0 0; position:sticky; top:0;
  }
  .drawer-title{ font-weight:700; font-size:0.92rem; }
  .drawer-sub{ font-size:0.74rem; color:var(--text-2); margin-top:3px; }
  .drawer-head-actions{ display:flex; align-items:center; gap:8px; flex:none; }
  .drawer-reset{
    appearance:none; border:1px solid var(--line-strong); background:rgba(255,255,255,0.05);
    color:var(--text-1); font-family:'Inter',sans-serif; font-weight:700; font-size:0.68rem;
    padding:6px 10px; border-radius:100px; cursor:pointer; white-space:nowrap; transition: all .15s ease;
  }
  .drawer-reset:hover{ background:rgba(255,255,255,0.12); color:var(--tex
